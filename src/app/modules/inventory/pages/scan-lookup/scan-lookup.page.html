<ion-header>
  <ion-toolbar color="dark">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/inventory"></ion-back-button>
    </ion-buttons>
    <ion-title>Buscar por código</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <app-camera-scanner
    *ngIf="scanning"
    (scanned)="onScanned($event)"
    (closed)="onScannerClosed()"
  ></app-camera-scanner>

  <ion-button *ngIf="canScan && !scanning" expand="block" (click)="startScan()">
    <ion-icon slot="start" name="scan"></ion-icon>
    Escanear con cámara
  </ion-button>

  <ion-card *ngIf="!scanning">
    <ion-card-header>
      <ion-card-title>Código manual</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item lines="full">
        <ion-input
          label="Código"
          labelPlacement="stacked"
          placeholder="Pega o escribe el código"
          [(ngModel)]="manualCode"
          (keyup.enter)="submitManual()"
        ></ion-input>
      </ion-item>
      <ion-button
        expand="block"
        fill="outline"
        class="ion-margin-top"
        [disabled]="!manualCode.trim()"
        (click)="submitManual()"
      >
        <ion-icon slot="start" name="search"></ion-icon>
        Buscar
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
