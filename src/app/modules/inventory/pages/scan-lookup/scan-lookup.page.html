<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/inventory"></ion-back-button>
    </ion-buttons>
    <ion-title>Buscar por código</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-button *ngIf="cameraSupported" expand="block" (click)="scanWithCamera()">
    <ion-icon slot="start" name="scan"></ion-icon>
    Escanear con cámara
  </ion-button>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Código manual</ion-card-title>
      <ion-card-subtitle *ngIf="!cameraSupported">
        La cámara solo está disponible en el dispositivo. Usa el código manual.
      </ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-item lines="full">
        <ion-input
          label="Código"
          labelPlacement="stacked"
          placeholder="Pega o escribe el código"
          [(ngModel)]="manualCode"
          (keyup.enter)="submitManual()"
        ></ion-input>
      </ion-item>
      <ion-button
        expand="block"
        class="ion-margin-top"
        [disabled]="!manualCode.trim()"
        (click)="submitManual()"
      >
        <ion-icon slot="start" name="search"></ion-icon>
        Buscar
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
