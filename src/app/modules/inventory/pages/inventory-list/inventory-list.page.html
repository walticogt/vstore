<ion-header>
  <ion-toolbar color="dark">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Inventario</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/tabs/inventory/scan" title="Escanear">
        <ion-icon slot="icon-only" name="camera"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar color="dark">
    <ion-searchbar
      placeholder="Buscar por nombre, SKU o proveedor"
      [(ngModel)]="searchTerm"
      (ionInput)="onSearchChange()"
      debounce="250"
    ></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item *ngIf="suppliers.length > 0" lines="none">
    <ion-select
      label="Proveedor"
      [(ngModel)]="supplierFilter"
      (ionChange)="onSearchChange()"
      interface="popover"
      placeholder="Todos"
    >
      <ion-select-option value="">Todos</ion-select-option>
      <ion-select-option *ngFor="let s of suppliers" [value]="s">{{ s }}</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-list>
    <ion-item
      *ngFor="let product of products"
      button
      [routerLink]="['product', product.id]"
    >
      <ion-thumbnail slot="start" class="inv-thumb">
        <img *ngIf="product.images?.length" [src]="product.images?.[0]" alt="foto" />
        <div class="no-photo" *ngIf="!product.images?.length">
          <ion-icon name="image-outline"></ion-icon>
        </div>
      </ion-thumbnail>
      <ion-label>
        <h2>{{ product.name }}</h2>
        <p>S/ {{ product.price | number: '1.2-2' }}<span *ngIf="product.supplier"> · {{ product.supplier }}</span></p>
      </ion-label>
      <ion-badge slot="end" [color]="stockTotal(product) > 0 ? 'primary' : 'danger'">
        {{ stockTotal(product) }}
      </ion-badge>
    </ion-item>

    <ion-item *ngIf="products.length === 0" lines="none">
      <ion-label class="ion-text-center ion-text-wrap" color="medium">
        No hay productos. Vincula un código desde la pestaña Vincular.
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
