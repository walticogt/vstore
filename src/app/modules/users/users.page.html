<ion-header>
  <ion-toolbar color="dark">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Usuarios</ion-title>
  </ion-toolbar>
  <ion-toolbar color="dark">
    <ion-searchbar
      [(ngModel)]="query"
      (ionInput)="onSearch()"
      placeholder="Buscar por correo"
      debounce="200"
    ></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list lines="full">
    <ion-item *ngFor="let u of users" button detail (click)="changeRole(u)">
      <ion-label>
        {{ u.email }}
        <p class="muted">{{ labels[u.role] }}</p>
      </ion-label>
      <ion-badge slot="end" [color]="u.role === 'admin' ? 'primary' : 'medium'">
        {{ labels[u.role] }}
      </ion-badge>
    </ion-item>
    <ion-item *ngIf="users.length === 0" lines="none">
      <ion-label color="medium">
        No hay cuentas registradas todavía. Se crean al iniciar sesión con Google.
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
