<ion-app>
  <ion-menu contentId="main-content" menuId="main-menu" type="overlay" [disabled]="!isLoggedIn">
    <ion-header>
      <ion-toolbar color="dark">
        <ion-title>VStore</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <div class="menu-user">
        <ion-icon name="person-circle" class="menu-avatar"></ion-icon>
        <div>
          <strong>{{ user }}</strong>
          <p>Administrador</p>
        </div>
      </div>

      <ion-list lines="none">
        <ion-menu-toggle [autoHide]="false">
          <ion-item button routerLink="/dashboard" detail="false">
            <ion-icon slot="start" name="home" color="secondary"></ion-icon>
            <ion-label>Inicio</ion-label>
          </ion-item>
          <ion-item button routerLink="/sync" detail="false">
            <ion-icon slot="start" name="sync" color="secondary"></ion-icon>
            <ion-label>Sincronización</ion-label>
          </ion-item>
          <ion-item button routerLink="/settings" detail="false">
            <ion-icon slot="start" name="settings" color="secondary"></ion-icon>
            <ion-label>Configuración</ion-label>
          </ion-item>
          <ion-item button routerLink="/profile" detail="false">
            <ion-icon slot="start" name="person" color="secondary"></ion-icon>
            <ion-label>Perfil / Acceso</ion-label>
          </ion-item>
          <ion-item button (click)="logout()" detail="false">
            <ion-icon slot="start" name="log-out" color="danger"></ion-icon>
            <ion-label color="danger">Cerrar sesión</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
